<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 | AI News Daily</title>
    <meta name="description" content="AI News Daily - 每日AI新闻详情">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="AI News Daily">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-lang-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white !important;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-left: 12px;
        }
        .nav-lang-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .news-key-points {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 24px 28px;
            margin: 28px 0;
            border-left: 4px solid var(--accent-primary);
        }
        .news-key-points h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .news-key-points ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .news-key-points li {
            position: relative;
            padding: 8px 0 8px 22px;
            font-size: 0.98rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }
        .news-key-points li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent-primary);
            font-weight: 700;
        }
        .news-body p {
            font-size: 1.05rem;
            line-height: 2;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }
        .news-body p strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        .news-source-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 24px 28px;
            margin: 36px 0;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .news-source-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .news-source-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .news-source-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .read-original-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--accent-gradient);
            color: white;
            border-radius: var(--radius-xl);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: var(--transition-fast);
            white-space: nowrap;
        }
        .read-original-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .related-section {
            margin-top: 56px;
            padding-top: 36px;
            border-top: 1px solid var(--border-color);
        }
        .related-section h2 {
            border-left: 4px solid var(--accent-secondary);
            padding-left: 16px;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        .related-item {
            display: block;
            padding: 18px 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            transition: var(--transition-fast);
        }
        .related-item:hover {
            border-color: var(--accent-primary);
            transform: translateX(4px);
            background: var(--bg-card-hover);
        }
        .related-item-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .related-item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-primary);
            font-size: 0.95rem;
            text-decoration: none;
            transition: var(--transition-fast);
            margin-top: 24px;
        }
        .back-link:hover {
            color: var(--accent-secondary);
            transform: translateX(-4px);
        }
        @media (max-width: 768px) {
            .news-source-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .news-key-points {
                padding: 20px;
            }
            .news-body p {
                font-size: 0.98rem;
                line-height: 1.85;
            }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🏠 AI News Daily</a>
            <div class="nav-links">
                <a href="index.html" id="nav-home">首页</a>
                <a href="about.html" id="nav-about">关于</a>
                <a href="contact.html" id="nav-contact">联系</a>
                <a href="#" id="lang-toggle" class="nav-lang-btn" onclick="event.preventDefault();var l=localStorage.getItem('ai_news_lang')||'zh';localStorage.setItem('ai_news_lang',l==='zh'?'en':'zh');location.reload();">EN</a>
            </div>
        </div>
    </nav>

    <article class="article-container" id="news-detail">
        <!-- 动态渲染 -->
    </article>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 AI News Daily. All rights reserved.</p>
            <p><a href="privacy.html">Privacy</a> | <a href="about.html">About</a> | <a href="contact.html">Contact</a></p>
        </div>
    </footer>

    <script src="js/i18n.js"></script>
    <script>
    (function() {
        'use strict';

        const params = new URLSearchParams(window.location.search);
        const newsId = params.get('id');

        if (!newsId) {
            document.getElementById('news-detail').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:80px 0;">未找到新闻</p>';
            return;
        }

        fetch('data/news.json')
            .then(r => r.json())
            .then(data => {
                let item = null;

                for (const day of data.days) {
                    if (day.hero && day.hero.id === newsId) {
                        item = day.hero;
                        break;
                    }
                }
                if (!item) {
                    for (const day of data.days) {
                        item = day.articles.find(a => a.id === newsId);
                        if (item) break;
                    }
                }

                if (!item) {
                    document.getElementById('news-detail').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:80px 0;">未找到新闻</p>';
                    return;
                }

                const lang = I18n.getLang();
                const isZh = lang === 'zh';

                const title = isZh ? item.title : (item.title_en || item.title);
                const summary = isZh ? item.summary : (item.summary_en || item.summary);
                const source = isZh ? item.source : (item.source_en || item.source);
                const categoryMap = {
                    '大模型': isZh ? '大模型' : 'LLM',
                    '芯片算力': isZh ? '芯片算力' : 'Chips & Computing',
                    'AI应用': isZh ? 'AI应用' : 'AI Applications',
                    '开源动态': isZh ? '开源动态' : 'Open Source',
                    '投融资': isZh ? '投融资' : 'Investment',
                    '政策监管': isZh ? '政策监管' : 'Policy & Regulation',
                    'AI商业': isZh ? 'AI商业' : 'AI Business',
                    '社会影响': isZh ? '社会影响' : 'Social Impact'
                };
                const categoryName = categoryMap[item.category] || item.category;
                const dateObj = new Date(item.date);
                const dateStr = isZh
                    ? dateObj.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
                    : dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

                const catColors = {
                    '大模型': 'var(--cat-大模型)', '芯片算力': 'var(--cat-芯片算力)',
                    'AI应用': 'var(--cat-AI应用)', '开源动态': 'var(--cat-开源动态)',
                    '投融资': 'var(--cat-投融资)', '政策监管': 'var(--cat-政策监管)',
                    'AI商业': 'var(--cat-投融资)', '社会影响': 'var(--cat-政策监管)'
                };
                const catColor = catColors[item.category] || 'var(--accent-primary)';

                // Content
                const content = isZh ? (item.content || item.summary) : (item.content_en || item.content || item.summary_en || item.summary);
                // Key points
                const keyPoints = isZh ? (item.key_points || []) : (item.key_points_en || item.key_points || []);

                // Update meta
                document.title = title + ' | AI News Daily';
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.content = summary;
                const ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = title;
                const ogDesc = document.querySelector('meta[property="og:description"]');
                if (ogDesc) ogDesc.content = summary;
                const ogImg = document.querySelector('meta[property="og:image"]');
                if (ogImg && item.image) ogImg.content = item.image;
                const twTitle = document.querySelector('meta[name="twitter:title"]');
                if (twTitle) twTitle.content = title;
                const twDesc = document.querySelector('meta[name="twitter:description"]');
                if (twDesc) twDesc.content = summary;

                // Related news
                let related = [];
                for (const day of data.days) {
                    const sameCat = day.articles.filter(a => a.id !== newsId);
                    // prioritize same category, then same day
                    const sameCatItems = sameCat.filter(a => a.category === item.category);
                    const otherItems = sameCat.filter(a => a.category !== item.category);
                    related = related.concat(sameCatItems.slice(0, 2)).concat(otherItems.slice(0, 2));
                }
                // deduplicate and limit
                const seen = new Set();
                related = related.filter(r => { if (seen.has(r.id)) return false; seen.add(r.id); return true; }).slice(0, 4);

                const sourceLabel = isZh ? '来源' : 'Source';
                const readOriginal = isZh ? '阅读原文 ↗' : 'Read Original ↗';
                const relatedTitle = isZh ? '相关新闻' : 'Related News';
                const backHome = isZh ? '← 返回首页' : '← Back to Home';
                const keyPointsTitle = isZh ? '🔑 关键要点' : '🔑 Key Points';

                let html = `
                    <header class="article-header">
                        <span class="article-category" style="background: ${catColor};">${categoryName}</span>
                        <h1>${title}</h1>
                        <div class="article-meta">
                            <span>📅 ${dateStr}</span>
                            <span>📰 ${sourceLabel}: ${source}</span>
                        </div>
                        <p class="article-subtitle">${summary}</p>
                        ${item.image ? `<div style="margin-top:24px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-color);"><img src="${item.image}" alt="${title}" style="width:100%;display:block;"></div>` : ''}
                    </header>
                `;

                // Key Points
                if (keyPoints.length > 0) {
                    html += `
                        <div class="news-key-points">
                            <h3>${keyPointsTitle}</h3>
                            <ul>
                                ${keyPoints.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                // Content body
                if (content && content !== summary) {
                    const paragraphs = content.split('\n\n').filter(p => p.trim());
                    html += `
                        <div class="news-body">
                            ${paragraphs.map(p => `<p>${p}</p>`).join('')}
                        </div>
                    `;
                }

                // Source card
                html += `
                    <div class="news-source-card">
                        <div class="news-source-info">
                            <span class="news-source-label">${sourceLabel}</span>
                            <span class="news-source-name">${source}</span>
                        </div>
                        ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="read-original-btn">${readOriginal}</a>` : ''}
                    </div>
                `;

                // Back link
                html += `<a href="index.html" class="back-link">${backHome}</a>`;

                // Related news
                if (related.length > 0) {
                    html += `
                        <section class="related-section">
                            <h2>${relatedTitle}</h2>
                    `;
                    related.forEach(r => {
                        const rTitle = isZh ? r.title : (r.title_en || r.title);
                        const rSource = isZh ? r.source : (r.source_en || r.source);
                        const rCat = categoryMap[r.category] || r.category;
                        html += `
                            <a href="news.html?id=${r.id}" class="related-item">
                                <div class="related-item-title">${rTitle}</div>
                                <div class="related-item-meta">${rSource} · ${rCat} · ${r.date}</div>
                            </a>
                        `;
                    });
                    html += `</section>`;
                }

                document.getElementById('news-detail').innerHTML = html;

                document.getElementById('nav-home').textContent = isZh ? '首页' : 'Home';
                document.getElementById('nav-about').textContent = isZh ? '关于' : 'About';
                document.getElementById('nav-contact').textContent = isZh ? '联系' : 'Contact';
                document.getElementById('lang-toggle').textContent = isZh ? 'EN' : '中文';
                document.documentElement.lang = isZh ? 'zh-CN' : 'en';
            })
            .catch(err => {
                console.error('Failed to load news:', err);
                document.getElementById('news-detail').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:80px 0;">加载失败，请稍后重试</p>';
            });
    })();
    </script>
</body>
</html>
